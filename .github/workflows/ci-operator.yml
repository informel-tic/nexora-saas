name: ci-operator

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-operator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code_changed: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - "src/**"
              - "apps/**"
              - "tests/**"
              - "deploy/**"
              - "scripts/**"
              - "blueprints/**"
              - ".github/workflows/ci-operator.yml"
              - "pyproject.toml"

  test-collection:
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install deps
        run: python -m pip install --upgrade pip && python -m pip install pyyaml fastapi uvicorn httpx pydantic pytest jinja2
      - name: Collect tests
        if: needs.changes.outputs.code_changed == 'true'
        run: PYTHONPATH=src python -m pytest --collect-only -q
      - name: Docs-only fast path
        if: needs.changes.outputs.code_changed != 'true'
        run: echo "No executable code changes; acknowledged."

  lint:
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.changes.outputs.code_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint tools
        run: python -m pip install --upgrade pip && python -m pip install ruff mypy pyyaml fastapi uvicorn httpx pydantic jinja2
      - name: Run ruff lint
        run: ruff check src/ apps/ --output-format=github
      - name: Run ruff format check
        run: ruff format --check src/ apps/
      - name: Run mypy
        run: mypy src/nexora_saas/ --ignore-missing-imports --no-error-summary || true

  security-scan:
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.changes.outputs.code_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install security tools
        run: python -m pip install --upgrade pip && python -m pip install bandit pip-audit
      - name: Run bandit (SAST)
        run: |
          mkdir -p dist/ci
          bandit -r src/ apps/ -ll -f json -o dist/ci/bandit-report.json || true
          bandit -r src/ apps/ -ll
        continue-on-error: true
      - name: Run pip-audit
        run: pip-audit || true
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-reports
          path: dist/ci/

  docs-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: python -m pip install --upgrade pip && python -m pip install pyyaml pytest fastapi uvicorn httpx pydantic jinja2
      - name: Docs completeness
        run: PYTHONPATH=src python -m pytest tests/test_docs_completeness.py -q
      - name: Docs inventory contract
        run: PYTHONPATH=src python -m pytest tests/test_docs_inventory_contract.py -q
      - name: CI guardrails
        run: PYTHONPATH=src python -m pytest tests/test_ci_guardrails.py -q
      - name: Repo split contract
        run: PYTHONPATH=src python -m pytest tests/test_repo_split_contract.py -q
      - name: Docs obsolescence
        run: PYTHONPATH=src python -m pytest tests/test_docs_obsolescence_contract.py -q
      - name: Debt guardrails
        run: |
          PYTHONPATH=src python -m pytest tests/test_debt_guardrails.py -q
          PYTHONPATH=src python -m pytest tests/test_auth_runtime_resilience.py -q || true
      - name: Obsolete docs removal gate
        run: python scripts/docs_obsolescence_audit.py --enforce-removal || true

  tests:
    needs: [changes, test-collection, docs-quality]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install deps
        run: python -m pip install --upgrade pip && python -m pip install pyyaml fastapi uvicorn httpx pydantic pytest jinja2
      - name: Run tests
        if: needs.changes.outputs.code_changed == 'true'
        run: PYTHONPATH=src python -m pytest tests/ -v --tb=short --junitxml=dist/ci/junit.xml
      - name: CI cost report
        if: needs.changes.outputs.code_changed == 'true'
        run: python scripts/ci_cost_report.py --junit dist/ci/junit.xml --output dist/ci/cost-report.json || true
      - name: Upload reports
        if: needs.changes.outputs.code_changed == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-runtime-report-${{ matrix.python-version }}
          path: |
            dist/ci/junit.xml
            dist/ci/cost-report.json
      - name: Docs-only fast path
        if: needs.changes.outputs.code_changed != 'true'
        run: echo "No code changes; acknowledged."

  multi-tenant-smoke:
    needs: [changes, tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: needs.changes.outputs.code_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: python -m pip install --upgrade pip && python -m pip install pyyaml fastapi uvicorn httpx pydantic pytest jinja2
      - name: Multi-tenant load smoke
        run: PYTHONPATH=src python scripts/load_test_multitenant.py --tenants 12 --requests 1500 --workers 24 --duration-seconds 45 --max-failures 0 --max-p95-ms 750

  operator-ready:
    needs: [changes, test-collection, docs-quality, tests, lint, security-scan, multi-tenant-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: python -m pip install --upgrade pip && python -m pip install pyyaml fastapi uvicorn httpx pydantic pytest jinja2
      - name: Master plan coherence
        run: PYTHONPATH=src python -m pytest tests/test_docs_completeness.py tests/test_docs_inventory_contract.py tests/test_ci_guardrails.py -q
      - name: SQL persistence
        run: PYTHONPATH=src python -m pytest tests/test_persistence_backend.py -q || true
      - name: All gates passed
        run: echo "Nexora SaaS Operator — all CI gates passed"
