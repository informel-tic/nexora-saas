name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect whether any Python/code files changed to enable a fast path for docs-only PRs.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code_changed }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect code changes
        id: filter
        run: |
          git fetch origin ${{ github.base_ref || 'main' }} --depth=1 2>/dev/null || true
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E '\.(py|sh|toml|cfg)$' | head -1 || echo '')
          if [ -n "$CHANGED" ]; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "code_changed=false" >> "$GITHUB_OUTPUT"
          fi

  test-collection:
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect tests
        if: "needs.changes.outputs.code_changed == 'true'"
        run: PYTHONPATH=src python -m pytest --collect-only -q
      - name: Docs-only fast path
        if: "needs.changes.outputs.code_changed != 'true'"
        run: echo "No code changes detected — skipping test collection"

  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docs completeness
        run: PYTHONPATH=src python -m pytest tests/test_docs_completeness.py -q
      - name: Docs inventory contract
        run: PYTHONPATH=src python -m pytest tests/test_docs_inventory_contract.py -q
      - name: CI guardrails
        run: PYTHONPATH=src python -m pytest tests/test_ci_guardrails.py -q
      - name: Repo split contract
        run: PYTHONPATH=src python -m pytest tests/test_repo_split_contract.py -q
      - name: Docs obsolescence
        run: PYTHONPATH=src python -m pytest tests/test_docs_obsolescence_contract.py -q
      - name: Debt guardrails
        run: |
          PYTHONPATH=src python -m pytest tests/test_debt_guardrails.py -q
          PYTHONPATH=src python -m pytest tests/test_auth_runtime_resilience.py -q || true
      - name: Obsolete docs removal gate
        run: python scripts/docs_obsolescence_audit.py --enforce-removal || true

  tests:
    needs: [changes, test-collection, docs-quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        if: "needs.changes.outputs.code_changed == 'true'"
        run: |
          mkdir -p dist/ci
          PYTHONPATH=src python -m pytest tests/ -v --tb=short --junitxml=dist/ci/junit.xml
      - name: Generate CI cost report
        if: "needs.changes.outputs.code_changed == 'true'"
        run: python scripts/ci_cost_report.py --junit dist/ci/junit.xml --output dist/ci/cost-report.json
      - name: Docs-only fast path
        if: "needs.changes.outputs.code_changed != 'true'"
        run: echo "No code changes detected — skipping full test run"

  lint:
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ruff check
        run: python -m pip install ruff && python -m ruff check src/ apps/

  security-scan:
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run bandit
        run: python -m pip install bandit && bandit -r src/ apps/ -ll || true

  vision-final-ready:
    needs: [changes, test-collection, docs-quality, tests, lint, security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Persistence check
        run: PYTHONPATH=src python -m pytest tests/test_persistence_backend.py -q || true
      - name: Load test smoke
        run: python scripts/load_test_multitenant.py --tenants 2 --requests 50 --workers 2 --duration-seconds 5 --max-failures 0 --max-p95-ms 750 || true
