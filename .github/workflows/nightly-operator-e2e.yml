name: nightly-operator-e2e

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  operator-e2e-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: python -m pip install --upgrade pip && python -m pip install pyyaml fastapi uvicorn httpx pydantic pytest
      - name: Run operator compatibility matrix (adopt/augment/fresh)
        run: ./scripts/e2e_operator_matrix.sh
      - name: Upload operator matrix artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-operator-e2e-matrix
          path: dist/e2e-matrix/operator-e2e-matrix.json
