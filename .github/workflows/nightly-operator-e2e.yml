name: nightly-operator-e2e

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  operator-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        mode: [fresh, adopt, augment]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: python -m pip install --upgrade pip && python -m pip install pyyaml fastapi uvicorn httpx pydantic pytest jinja2
      - name: Run E2E operator matrix (${{ matrix.mode }})
        run: bash scripts/e2e_operator_matrix.sh --mode ${{ matrix.mode }}
