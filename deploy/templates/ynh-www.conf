# Nexora SaaS — Public website (www.*)
# YunoHost-compatible location blocks — included inside the auto-generated server{} block
#
# Replace __PORT__ with the control plane port (default: 38120)
#
# YunoHost already provides: server_name, ssl, security headers, logging

# Cache static public site assets
location /public_site/ {
    proxy_pass http://127.0.0.1:__PORT__/public_site/;
    proxy_set_header Host $host;
    proxy_set_header X-Nexora-Surface "public";
    expires 1h;
}

# All paths — proxy to backend with public surface tag
location / {
    proxy_pass http://127.0.0.1:__PORT__/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Nexora-Surface "public";

    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_request_buffering off;
}
