# Nexora SaaS — Public website (www.*)
# Serves the public subscription/marketing page.
# No authentication required.
#
# Replace __DOMAIN__ with the base domain (e.g. srv2testrchon.nohost.me)
# Replace __PORT__ with the control plane port (default: 38120)

server {
    listen 80;
    listen [::]:80;
    server_name www.__DOMAIN__;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.__DOMAIN__;

    # SSL certificates managed by YunoHost / Let's Encrypt
    ssl_certificate     /etc/yunohost/certs/__DOMAIN__/crt.pem;
    ssl_certificate_key /etc/yunohost/certs/__DOMAIN__/key.pem;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:__PORT__/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Nexora-Surface "public";

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Cache static public site assets
    location /public_site/ {
        proxy_pass http://127.0.0.1:__PORT__/public_site/;
        proxy_set_header Host $host;
        proxy_set_header X-Nexora-Surface "public";
        expires 1h;
    }
}
