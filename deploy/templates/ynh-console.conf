# Nexora SaaS — Subscriber Console (console.*)
# YunoHost-compatible location blocks — included inside the auto-generated server{} block
#
# Replace __PORT__ with the control plane port (default: 38120)
#
# YunoHost already provides: server_name, ssl, security headers, logging

# Block owner console paths on subscriber surface
location /owner-console/ {
    return 403 '{"detail": "Not available on subscriber console."}';
    add_header Content-Type application/json always;
}

# Subscriber console static assets
location /console/ {
    proxy_pass http://127.0.0.1:__PORT__/console/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Nexora-Surface "console";

    proxy_buffering off;
    expires 30m;
}

# API and all other paths — proxy to backend with console surface tag
location / {
    proxy_pass http://127.0.0.1:__PORT__/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Nexora-Surface "console";

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_buffering off;
    proxy_request_buffering off;
}
