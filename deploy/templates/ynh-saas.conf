# Nexora SaaS — Owner Console (saas.*)
# YunoHost-compatible location blocks — included inside the auto-generated server{} block
#
# Replace __PORT__ with the control plane port (default: 38120)
#
# YunoHost already provides: server_name, ssl, security headers, logging

# Allow shared console assets (JS/CSS/SVG) used by owner console
location ~ ^/console/(components\.js|views\.js|styles\.css|assets/) {
    proxy_pass http://127.0.0.1:__PORT__;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Nexora-Surface "saas";
    expires 1h;
}

# Block subscriber console SPA (entry page and app bootstrap)
location /console/ {
    return 403 '{"detail": "Not available on owner console. Use /owner-console/"}';
    add_header Content-Type application/json always;
}

# Owner console static assets
location /owner-console/ {
    proxy_pass http://127.0.0.1:__PORT__/owner-console/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Nexora-Surface "saas";

    proxy_buffering off;
    expires 30m;
}

# API and all other paths — proxy to backend with saas surface tag
location / {
    proxy_pass http://127.0.0.1:__PORT__/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Nexora-Surface "saas";

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_buffering off;
    proxy_request_buffering off;
}
