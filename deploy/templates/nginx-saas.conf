# Nexora SaaS — Owner Console (saas.*)
# Serves the SaaS owner console with passphrase-based authentication.
# The owner (project creator) has full access to all features.
#
# Replace __DOMAIN__ with the base domain (e.g. srv2testrchon.nohost.me)
# Replace __PORT__ with the control plane port (default: 38120)

server {
    listen 80;
    listen [::]:80;
    server_name saas.__DOMAIN__;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name saas.__DOMAIN__;

    # SSL certificates — YunoHost creates per-subdomain at /etc/yunohost/certs/<fqdn>/
    ssl_certificate     /etc/yunohost/certs/saas.__DOMAIN__/crt.pem;
    ssl_certificate_key /etc/yunohost/certs/saas.__DOMAIN__/key.pem;

    # Strict security headers for owner surface
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://saas.__DOMAIN__; frame-ancestors 'none'" always;

    # Allow shared console assets (JS/CSS/SVG) used by owner console
    location ~ ^/console/(components\.js|views\.js|styles\.css|assets/) {
        proxy_pass http://127.0.0.1:__PORT__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Nexora-Surface "saas";
        expires 1h;
    }

    # Block subscriber console SPA (entry page and app bootstrap)
    location /console/ {
        return 403 '{"detail": "Not available on owner console. Use /owner-console/"}';
        add_header Content-Type application/json;
    }

    location / {
        proxy_pass http://127.0.0.1:__PORT__/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Nexora-Surface "saas";

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_request_buffering off;

        # NO SSO panel — owner uses passphrase auth
    }

    location /owner-console/ {
        proxy_pass http://127.0.0.1:__PORT__/owner-console/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Nexora-Surface "saas";

        proxy_buffering off;
        expires 30m;
    }
}
