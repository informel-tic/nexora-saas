# Nexora SaaS — Subscriber Console (console.*)
# Serves the subscriber console with token-based authentication.
# Subscribers authenticate via API token + tenant ID.
#
# Replace __DOMAIN__ with the base domain (e.g. srv2testrchon.nohost.me)
# Replace __PORT__ with the control plane port (default: 38120)

server {
    listen 80;
    listen [::]:80;
    server_name console.__DOMAIN__;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name console.__DOMAIN__;

    ssl_certificate     /etc/yunohost/certs/__DOMAIN__/crt.pem;
    ssl_certificate_key /etc/yunohost/certs/__DOMAIN__/key.pem;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;

    # Block owner console paths on subscriber surface
    location /owner-console/ {
        return 403 '{"detail": "Not available on subscriber console."}';
        add_header Content-Type application/json;
    }

    location / {
        proxy_pass http://127.0.0.1:__PORT__/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Nexora-Surface "console";

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_request_buffering off;

        # DO NOT include YunoHost SSO panel — subscriber uses its own token auth
        # include conf.d/yunohost_panel.conf.inc;
    }

    location /console/ {
        proxy_pass http://127.0.0.1:__PORT__/console/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Nexora-Surface "console";

        proxy_buffering off;
        expires 30m;
    }
}
